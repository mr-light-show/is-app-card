name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync dist bundle
        run: ./scripts/sync-dist.sh
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/is-app-card.js
